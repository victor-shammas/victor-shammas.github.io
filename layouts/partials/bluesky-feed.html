{{/* 
  Bluesky Feed — Full-width variant
  5 posts, full width. For use on the Media page.
  Place in layouts/partials/bluesky-feed.html
  Usage: {{ partial "bluesky-feed.html" . }}
*/}}

<aside class="bsky-feed" id="bsky-feed" aria-label="Bluesky feed">
  <div class="bsky-feed__header">
    <svg class="bsky-feed__icon" viewBox="0 0 600 530" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M135.72 44.03C202.216 93.951 273.74 195.17 300 249.49c26.262-54.316 97.782-155.54 164.28-205.46C512.26 8.009 590-19.862 590 68.825c0 17.712-10.155 148.79-16.111 170.07-20.703 73.984-96.144 92.854-163.25 81.433 117.3 19.964 147.14 86.092 82.697 152.22-122.39 125.59-175.91-31.511-189.63-71.766-2.514-7.38-3.69-10.832-3.708-7.896-.017-2.936-1.193.516-3.707 7.896-13.714 40.255-67.233 197.36-189.63 71.766-64.444-66.128-34.605-132.256 82.697-152.22-67.106 11.42-142.547-7.45-163.25-81.433C20.15 217.613 10 86.536 10 68.824c0-88.687 77.742-60.816 125.72-24.795z"/>
    </svg>
    <span class="bsky-feed__title">Bluesky</span>
    <a class="bsky-feed__follow" href="https://bsky.app/profile/victorshammas.com" target="_blank" rel="noopener noreferrer">Follow</a>
  </div>
  <div class="bsky-feed__posts" id="bsky-feed-posts">
    <div class="bsky-feed__loading">Loading posts&hellip;</div>
  </div>
  <a class="bsky-feed__view-more" href="https://bsky.app/profile/victorshammas.com" target="_blank" rel="noopener noreferrer">
    View on Bluesky &rarr;
  </a>
</aside>

<style>
  .bsky-feed {
    border: 1px solid #e2e2e2;
    border-radius: 8px;
    padding: 1.25rem;
    font-family: inherit;
    font-size: 0.9rem;
    line-height: 1.45;
    background: #fafafa;
    max-width: 100%;
    margin-top: 2rem;
  }
  .bsky-feed__header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #e2e2e2;
  }
  .bsky-feed__icon {
    width: 20px;
    height: 20px;
    color: #0085ff;
    flex-shrink: 0;
  }
  .bsky-feed__title {
    font-weight: 600;
    flex-grow: 1;
  }
  .bsky-feed__follow {
    font-size: 0.8rem;
    font-weight: 600;
    color: #fff;
    background: #0085ff;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
  }
  .bsky-feed__follow:hover {
    background: #0070dd;
  }
  .bsky-feed__posts {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .bsky-feed__loading {
    color: #888;
    font-size: 0.85rem;
    padding: 1rem 0;
    text-align: center;
  }
  .bsky-feed__error {
    color: #c0392b;
    font-size: 0.85rem;
    padding: 1rem 0;
    text-align: center;
  }
  .bsky-post {
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #eee;
  }
  .bsky-post:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }
  .bsky-post__text {
    margin: 0 0 0.35rem 0;
    color: #1a1a1a;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .bsky-post__text a {
    color: #0085ff;
    text-decoration: none;
  }
  .bsky-post__text a:hover {
    text-decoration: underline;
  }
  .bsky-post__meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.8rem;
    color: #888;
  }
  .bsky-post__meta a {
    color: #888;
    text-decoration: none;
  }
  .bsky-post__meta a:hover {
    color: #0085ff;
  }
  .bsky-post__stat {
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }
  .bsky-feed__view-more {
    display: block;
    text-align: center;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid #e2e2e2;
    font-size: 0.85rem;
    font-weight: 500;
    color: #0085ff;
    text-decoration: none;
  }
  .bsky-feed__view-more:hover {
    text-decoration: underline;
  }
  @media (prefers-color-scheme: dark) {
    .bsky-feed {
      background: #1a1a1a;
      border-color: #333;
    }
    .bsky-feed__header {
      border-bottom-color: #333;
    }
    .bsky-post {
      border-bottom-color: #333;
    }
    .bsky-post__text {
      color: #e0e0e0;
    }
    .bsky-feed__view-more {
      border-top-color: #333;
    }
  }
</style>

<script>
(function () {
  var BSKY_HANDLE = "victorshammas.com";
  var POST_LIMIT = 5;
  var API_URL = "https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed";
  var container = document.getElementById("bsky-feed-posts");

  function timeAgo(dateStr) {
    var now = Date.now();
    var then = new Date(dateStr).getTime();
    var diff = Math.floor((now - then) / 1000);
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff / 60) + "m";
    if (diff < 86400) return Math.floor(diff / 3600) + "h";
    if (diff < 604800) return Math.floor(diff / 86400) + "d";
    return new Date(dateStr).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function postUrl(uri) {
    return "https://bsky.app/profile/" + BSKY_HANDLE + "/post/" + uri.split("/").pop();
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function linkify(text, facets) {
    if (!facets || facets.length === 0) return escapeHtml(text);
    var encoder = new TextEncoder();
    var bytes = encoder.encode(text);
    var sorted = [].concat(facets).sort(function (a, b) { return a.index.byteStart - b.index.byteStart; });
    var result = "";
    var lastByte = 0;
    for (var i = 0; i < sorted.length; i++) {
      var facet = sorted[i];
      var start = facet.index.byteStart;
      var end = facet.index.byteEnd;
      var decoder = new TextDecoder();
      result += escapeHtml(decoder.decode(bytes.slice(lastByte, start)));
      var segment = new TextDecoder().decode(bytes.slice(start, end));
      var feature = facet.features[0];
      if (feature && feature.$type === "app.bsky.richtext.facet#link") {
        result += '<a href="' + escapeHtml(feature.uri) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(segment) + "</a>";
      } else if (feature && feature.$type === "app.bsky.richtext.facet#mention") {
        result += '<a href="https://bsky.app/profile/' + escapeHtml(feature.did) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(segment) + "</a>";
      } else if (feature && feature.$type === "app.bsky.richtext.facet#tag") {
        result += '<a href="https://bsky.app/hashtag/' + encodeURIComponent(feature.tag) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(segment) + "</a>";
      } else {
        result += escapeHtml(segment);
      }
      lastByte = end;
    }
    result += escapeHtml(new TextDecoder().decode(bytes.slice(lastByte)));
    return result;
  }

  function renderPost(item) {
    var post = item.post;
    var record = post.record;
    return '<div class="bsky-post">' +
      '<p class="bsky-post__text">' + linkify(record.text, record.facets) + "</p>" +
      '<div class="bsky-post__meta">' +
      '<a href="' + postUrl(post.uri) + '" target="_blank" rel="noopener noreferrer">' + timeAgo(record.createdAt) + "</a>" +
      '<span class="bsky-post__stat">&hearts; ' + (post.likeCount || 0) + "</span>" +
      '<span class="bsky-post__stat">&#x21BB; ' + (post.repostCount || 0) + "</span>" +
      "</div></div>";
  }

  fetch(API_URL + "?actor=" + encodeURIComponent(BSKY_HANDLE) + "&limit=" + POST_LIMIT + "&filter=posts_no_replies")
    .then(function (res) { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
    .then(function (data) {
      if (!data.feed || data.feed.length === 0) { container.innerHTML = '<div class="bsky-feed__loading">No posts yet.</div>'; return; }
      container.innerHTML = data.feed.map(renderPost).join("");
    })
    .catch(function (err) {
      console.error("Bluesky feed error:", err);
      container.innerHTML = '<div class="bsky-feed__error">Could not load feed.</div>';
    });
})();
</script>
