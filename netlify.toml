[build]
  publish = "public"
  command = "hugo --minify"

[build.environment]
  HUGO_VERSION = "0.139.0"

# Redirect old Squarespace /s/ PDF paths to new /pdfs/ paths
[[redirects]]
  from = "/s/*"
  to = "/pdfs/:splat"
  status = 301

# Redirect /blog/ pagination (Squarespace used ?offset=)
[[redirects]]
  from = "/blog?offset=*"
  to = "/blog/page/2/"
  status = 301

# Ensure trailing slashes for clean URLs
[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/media"
  to = "/media/"
  status = 301

[[redirects]]
  from = "/norwegian-writings"
  to = "/norwegian/"
  status = 301

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/pdfs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
